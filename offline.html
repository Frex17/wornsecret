<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Offline — WornSecret</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --noir:#0d0b0e; --deep:#1a1520; --text:#f0ebe8; --text2:#a89fa8; --rose:#c9768a; --rose2:#e8a0b0; --border2:rgba(255,255,255,0.13); }
body { font-family:'DM Sans',sans-serif; background:var(--noir); color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem; text-align:center; }
.box { max-width:420px; }
.logo { font-family:'Cormorant Garamond',serif; font-size:28px; letter-spacing:0.15em; margin-bottom:2rem; }
.logo span { color:var(--rose); }
.glyph { width:90px; height:90px; margin:0 auto 1.75rem; border-radius:50%; border:1px solid var(--border2); display:flex; align-items:center; justify-content:center; font-size:2.2rem; background:radial-gradient(circle at 50% 40%, rgba(201,118,138,0.12), transparent 70%); }
h1 { font-family:'Cormorant Garamond',serif; font-size:2rem; font-weight:300; margin-bottom:0.75rem; }
p { font-size:15px; color:var(--text2); line-height:1.7; margin-bottom:2rem; }
button { padding:13px 32px; background:var(--rose); color:#fff; border:none; border-radius:4px; font-size:14px; letter-spacing:0.03em; cursor:pointer; font-family:'DM Sans',sans-serif; transition:opacity 0.2s; }
button:hover { opacity:0.9; }
</style>
</head>
<body>
  <div class="box">
    <div class="glyph">📡</div>
    <div class="logo">Worn<span>Secret</span></div>
    <h1>Sei offline</h1>
    <p>Sembra che tu non sia connesso a internet. Controlla la connessione e riprova — le pagine che hai già visitato restano disponibili.</p>
    <button onclick="location.reload()">Riprova</button>
  </div>
</body>
</html>
